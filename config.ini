[config]

; Configuration file for service discovery and health checks

; DNS resolver for service discovery
dns_resolver = 'dnspython'

; Timeout for DNS resolution and HTTP probes (in seconds)
resolution_timeout = 5
probe_timeout = 3

; Retry policy for service health checks
retry_policy =
    max_retries = 3
    initial_delay = 1
    max_delay = 30

; Service discovery and health check targets
services =
    service1 =
        name = 'service1.example.com'
        ports = [80, 443]
        dns_resolver = ${dns_resolver}
        resolution_timeout = ${resolution_timeout}
        probe_timeout = ${probe_timeout}
        retry_policy = ${retry_policy}
    service2 =
        name = 'service2.example.com'
        ports = [8080, 8443]
        dns_resolver = ${dns_resolver}
        resolution_timeout = ${resolution_timeout}
        probe_timeout = ${probe_timeout}
        retry_policy = ${retry_policy}

; Alerting and logging mechanisms
alerting =
    log_level = INFO
    log_format = '%(asctime)s - %(levelname)s - %(message)s'
    alerting_methods = [email, slack]
    email =
        subject = 'Service Health Alert'
        from = 'health-check-monitor@example.com'
        to = 'devops@example.com'
    slack =
        webhook_url = 'https://hooks.slack.com/services/...'

; Logging configuration
logging =
    filename = '/var/log/health-check-monitor.log'
    maxbytes = 10485760
    backupcount = 5